name: Scent Spot API - Newman Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman and HTML reporter
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests
        env:
          BASE_URL: ${{ secrets.RAILWAY_PROD_URL }}
          PRODUCT_ID: ${{ secrets.PRODUCT_ID }}
          USER_ID: ${{ secrets.USER_ID }}
        run: |
          newman run scent-spot-collection.json \
          -e scent-spot-environment.json \
          --env-var "base_url=$BASE_URL" \
          --env-var "productId=$PRODUCT_ID" \
          --env-var "userId=$USER_ID" \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./reports/scent-spot-report.html \
          --reporter-htmlextra-title "Scent Spot API Test Report"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: ./reports/scent-spot-report.html
