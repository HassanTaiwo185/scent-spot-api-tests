name: Scent Spot API - Newman Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  newman-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman and HTML reporter
        run: |
          npm install -g newman newman-reporter-htmlextra

      - name: Run Newman tests
        run: |
          newman run scent-spot-collection.json \
          --env-var "base_url=${{ secrets.RAILWAY_PROD_URL }}" \
          --env-var "productId=${{ secrets.PRODUCT_ID }}" \
          --env-var "userId=${{ secrets.USER_ID }}" \
          --env-var "authToken=" \
          --env-var "userToken=" \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./reports/scent-spot-report.html \
          --reporter-htmlextra-title "Scent Spot API Test Report"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: ./reports/scent-spot-report.html
