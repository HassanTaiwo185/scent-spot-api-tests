name: Scent Spot API - CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-staging:
    name: Test Against Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Wait for staging to be ready
        run: sleep 10

      - name: Run Newman tests against Staging
        run: |
          newman run scent-spot-collection.json \
          --env-var "base_url=${{ secrets.RAILWAY_STAGING_URL }}" \
          --env-var "productId=${{ secrets.PRODUCT_ID }}" \
          --env-var "userId=${{ secrets.USER_ID }}" \
          --env-var "adminEmail=${{ secrets.ADMIN_EMAIL }}" \
          --env-var "adminPassword=${{ secrets.ADMIN_PASSWORD }}" \
          --env-var "authToken=" \
          --env-var "userToken=" \
          --env-var "testEmail=" \
          --env-var "testUsername=" \
          -r cli,htmlextra \
          --reporter-htmlextra-export ./reports/scent-spot-report.html \
          --reporter-htmlextra-title "Scent Spot API Test Report - Staging"

      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: newman-report
          path: ./reports/scent-spot-report.html
